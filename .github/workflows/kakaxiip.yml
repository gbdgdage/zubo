name: kakaxi_ip

on:
  schedule:
    - cron: '0 16 * * *'  
  workflow_dispatch:       # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 我的仓库 (zubo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 下载源 iptv.txt 文件
        run: |
          curl -L https://github.com/kakaxi-1/IPTV/raw/refs/heads/main/iptv.txt -o iptv.txt

      - name: 解析并追加到对应文件
        run: |
          # 定义需要加“市”的直辖市列表
          CITY_LIST="北京 上海 天津 重庆"

          # 逐行解析 iptv.txt
          while IFS= read -r line; do
            # 跳过空行
            [[ -z "$line" ]] && continue

            # 提取 URL 部分（$ 之前的内容）和标签部分（$ 之后的内容）
            url_part="${line%%$*}"
            label_part="${line##*$}"

            # 从 URL 中提取最后一个 IP:端口（格式：xxx.xxx.xxx.xxx:port）
            if [[ $url_part =~ ([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+) ]]; then
              ip_port="${BASH_REMATCH[1]}"
            else
              continue  # 没有匹配到 IP:端口则跳过
            fi

            # 从标签中提取省市运营商（去掉末尾数字，如 北京联通11 → 北京联通）
            if [[ $label_part =~ ([^0-9]+)[0-9]+$ ]]; then
              province_operator="${BASH_REMATCH[1]}"
            else
              province_operator="$label_part"
            fi

            # 分离省市和运营商（匹配 电信/移动/联通）
            if [[ $province_operator =~ (.*)(电信|移动|联通) ]]; then
              province_part="${BASH_REMATCH[1]}"
              operator="${BASH_REMATCH[2]}"
            else
              continue  # 无法识别运营商则跳过
            fi

            # 判断是否为直辖市，决定是否加“市”
            if echo " $CITY_LIST " | grep -q " $province_part "; then
              target_province="${province_part}市"
            else
              target_province="$province_part"
            fi

            # 拼接目标文件名
            target_file="./ip/${target_province}${operator}.txt"

            # 确保目标文件存在
            touch "$target_file"

            # 追加 IP:端口 到目标文件
            echo "$ip_port" >> "$target_file"

            # 去重（保留唯一记录）
            sort -u "$target_file" -o "$target_file"
          done < iptv.txt

          # 清理临时文件
          rm -f iptv.txt

      - name: 提交并推送更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ip/
          git commit -m "Auto extract & append IP from iptv.txt" || echo "No changes to commit"
          git push
