name: hotel_ip 
on:
  schedule:
    - cron: '0 22 * * 6'
  workflow_dispatch:
jobs:
  hotel-ip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies & ffmpeg
        run: |
          python -m pip install --upgrade pip
          pip install requests pysocks
          sudo apt update
          sudo apt install -y ffmpeg

      - name: 提取IP端口 + 分辨率识别
        run: |
          cat > hotel_ip_port.py << 'EOF'
          import requests
          import re
          import os
          import math
          import time
          import json
          import socket
          import threading
          import subprocess
          from urllib.parse import urlparse
          from concurrent.futures import ThreadPoolExecutor, as_completed

          # ===================== 全局配置 =====================
          SOURCE_URLS = [
              "https://raw.githubusercontent.com/mzky/checklist/refs/heads/master/itvlist.m3u",
              "https://github.com/adminouyang/TV-yjc/raw/refs/heads/main/Hotel/iptv.txt",
              "https://github.com/yyyr-otz/iptv-api/raw/refs/heads/master/output/ipv4/result.txt",
              "https://lisa3456.github.io/hotel.txt",
              "https://gongdian.top/tv/guovin"
          ]

          FOFA_URL = "https://fofa.info/result?qbase64=ImlwdHYvbGl2ZS96aF9jbi5qcyIgJiYgY291bnRyeT0iQ04i"
          FOFA_HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Referer": "https://fofa.info/",
              "Accept-Language": "zh-CN,zh;q=0.9"
          }

          HEADERS = {
              'User-Agent': 'okhttp/5.1.0',
              'Accept': '*/*',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
              'Connection': 'keep-alive',
              'Accept-Encoding': 'gzip, deflate',
          }

          DETECT_TIMEOUT = 8
          TEST_TS_NUM = 3
          MIN_CHUNK_SIZE = 512
          MIN_VALID_TS = 2
          CHECK_THREAD_NUM = 10
          IP_THREAD_NUM = 15
          TS_THREAD_NUM = 3
          # ======================================================

          def get_video_resolution(ts_url):
              try:
                  cmd = [
                      'ffprobe', '-v', 'error',
                      '-select_streams', 'v:0',
                      '-show_entries', 'stream=width,height',
                      '-of', 'csv=s=x:p=0',
                      '-timeout', '5000000',
                      ts_url
                  ]
                  res = subprocess.check_output(cmd, timeout=7).decode().strip()
                  return res if 'x' in res else 'unknown'
              except:
                  return 'unknown'

          def fofa_crawl_ip():
              ip_port_set = set()
              print("【FOFA爬取】开始搜索iptv/live/相关IP:端口...")
              try:
                  resp = requests.get(FOFA_URL, headers=FOFA_HEADERS, timeout=20, verify=False)
                  if resp.status_code != 200:
                      print(f"【FOFA爬取】请求失败，状态码: {resp.status_code}")
                      return ip_port_set
                  ip_port_matches = re.findall(r'<a href="http://([\d\.]+:\d+)"', resp.text)
                  for ip_port in ip_port_matches:
                      ip = ip_port.split(':')[0]
                      if not ip.startswith(('10.', '172.16.', '192.168.', '127.', '169.254.')):
                          ip_port_set.add(ip_port)
                  print(f"【FOFA爬取】完成，提取到公网IP:端口共 {len(ip_port_set)} 个")
              except Exception as e:
                  print(f"【FOFA爬取】异常: {str(e)[:50]}")
              return ip_port_set

          def check_single_ip(ip_port):
              url_ends = ["/iptv/live/1000.json?key=txiptv", "/ZHGXTV/Public/json/live_interface.txt"]
              for end in url_ends:
                  try:
                      url = f"http://{ip_port}{end}"
                      resp = requests.get(url, timeout=3, headers=HEADERS, verify=False)
                      resp.raise_for_status()
                      if "tsfile" in resp.text or "hls" in resp.text or "m3u8" in resp.text:
                          return url
                  except:
                      continue
              return None

          def check_ip_availability(ip_port, timeout=5):
              try:
                  valid_url = check_single_ip(ip_port)
                  if valid_url:
                      return True, valid_url
                  return False, None
              except:
                  return False, None

          def hotel_channels_from_ip_port(ip_port, interface_url):
              hotel_channels = []
              try:
                  urls = interface_url.split('/', 3)
                  url_x = f"{urls[0]}//{urls[2]}"
                  current_ip_port = urls[2]
                  if "ZHGXTV" in interface_url:
                      response = requests.get(interface_url, timeout=2, headers=HEADERS, verify=False)
                      json_data = response.content.decode('utf-8')
                      for line in json_data.split('\n'):
                          line = line.strip()
                          if not line or "," not in line:
                              continue
                          if "hls" in line or "m3u8" in line:
                              name, channel_url = line.split(',', 1)
                              channel_url = re.sub(r'(\d+\.\d+\.\d+\.\d+)(:\d+)?/', f'{current_ip_port}/', channel_url)
                              hotel_channels.append((name.strip(), channel_url.strip()))
                  elif "iptv" in interface_url:
                      response = requests.get(interface_url, timeout=3, headers=HEADERS, verify=False)
                      json_data = response.json()
                      for item in json_data.get('data', []):
                          if isinstance(item, dict):
                              name = item.get('name', '').strip()
                              urlx = item.get('url', '').strip()
                              if name and urlx and ("tsfile" in urlx or "m3u8" in urlx):
                                  if not urlx.startswith('/'):
                                      urlx = '/' + urlx
                                  urld = f"{url_x}{urlx}"
                                  hotel_channels.append((name, urld))
              except:
                  pass
              return hotel_channels

          def calculate_standard_deviation(data):
              if len(data) < 2:
                  return 0.0
              mean = sum(data) / len(data)
              variance = sum((x - mean) ** 2 for x in data) / len(data)
              return math.sqrt(variance)

          def test_single_ts(ts_url, session):
              try:
                  start = time.time()
                  ts_resp = session.get(ts_url, timeout=DETECT_TIMEOUT, stream=True, verify=False)
                  if ts_resp.status_code != 200:
                      return None
                  bytes_downloaded = 0
                  for chunk in ts_resp.iter_content(chunk_size=8192):
                      if chunk:
                          bytes_downloaded += len(chunk)
                          if time.time() - start >= DETECT_TIMEOUT:
                              break
                  if bytes_downloaded < MIN_CHUNK_SIZE:
                      return None
                  return round(time.time() - start, 2)
              except:
                  return None

          def smart_ts_detection(channel_url):
              try:
                  session = requests.Session()
                  session.headers.update(HEADERS)
                  session.mount('http://', requests.adapters.HTTPAdapter(max_retries=2))
                  session.mount('https://', requests.adapters.HTTPAdapter(max_retries=2))
                  m3u8_resp = session.get(channel_url, timeout=5, verify=False)
                  resolution = "unknown"

                  if m3u8_resp.status_code != 200:
                      ts_costs = []
                      for _ in range(TEST_TS_NUM):
                          cost = test_single_ts(channel_url, session)
                          if cost:
                              ts_costs.append(cost)
                      if len(ts_costs) < MIN_VALID_TS:
                          return False, [], 0.0, 0.0, [], resolution
                      resolution = get_video_resolution(channel_url)
                      avg_cost = round(sum(ts_costs)/len(ts_costs),2)
                      dev = round(calculate_standard_deviation(ts_costs),2)
                      return True, [], avg_cost, dev, ts_costs, resolution

                  m3u8_content = m3u8_resp.text
                  base_url = channel_url.rsplit('/',1)[0]+'/' if '/' in channel_url else channel_url+'/'

                  def extract_all_ts(content, base):
                      ts = []
                      for line in content.split():
                          line = line.strip()
                          if line.startswith('#'): continue
                          if line.endswith('.ts') or '.ts?' in line:
                              ts.append(line if line.startswith('http') else base+line)
                      return ts

                  ts_urls = extract_all_ts(m3u8_content, base_url)
                  if ts_urls:
                      resolution = get_video_resolution(ts_urls[0])

                  ts_costs = []
                  with ThreadPoolExecutor(TS_THREAD_NUM) as e:
                      fut = {e.submit(test_single_ts, u, session):u for u in ts_urls[:TEST_TS_NUM]}
                      for f in as_completed(fut):
                          c = f.result()
                          if c: ts_costs.append(c)

                  if len(ts_costs) < MIN_VALID_TS:
                      return False, ts_urls, 0,0,ts_costs,resolution
                  avg = round(sum(ts_costs)/len(ts_costs),2)
                  dev = round(calculate_standard_deviation(ts_costs),2)
                  return True, ts_urls, avg, dev, ts_costs, resolution
              except:
                  return False, [],0,0,[],'unknown'

          def merged_stream_test(channel_url):
              try:
                  ok, urls, avg, dev, costs, reso = smart_ts_detection(channel_url)
                  if not ok:
                      return False,0,False,0,"流失效",0,costs,reso
                  quality = 60
                  stable = False
                  if avg<=3 and dev<=0.8:
                      quality=95;stable=True
                  elif avg<=6 and dev<=1.2:
                      quality=80;stable=True
                  elif avg<=10 and dev<=2.0:
                      quality=70;stable=True
                  return True,avg,stable,quality,"正常",dev,costs,reso
              except:
                  return False,0,False,0,"异常",0,[],'unknown'

          def batch_stream_test(ip_port, channels):
              best = None
              try:
                  for name,url in channels:
                      if "CCTV" in name.upper():
                          ok,avg,stable,q,diag,dev,costs,reso = merged_stream_test(url)
                          print(f"      {name}: {'✅' if ok else '❌'} 分辨率:{reso} | 平均:{avg}s | 波动:{dev}")
                          return avg,stable,q,1,dev,reso
                  ok,avg,stable,q,diag,dev,costs,reso = merged_stream_test(channels[0][1])
                  print(f"      {channels[0][0]}: {'✅' if ok else '❌'} 分辨率:{reso} | 平均:{avg}s")
                  return avg,stable,q,1,dev,reso
              except:
                  return None,False,0,0,999,"unknown"

          def process_single_ip(ip_port, infourl, result_list, lock):
              try:
                  ch = hotel_channels_from_ip_port(ip_port, infourl)
                  if not ch: return
                  cost, stable, quality, cnt, dev, reso = batch_stream_test(ip_port, ch)
                  if cost is None: return
                  with lock:
                      result_list.append( (ip_port, (cost,stable,quality,dev,reso)) )
              except:
                  return

          def hotel_ip_port_from_urls():
              import urllib3
              urllib3.disable_warnings()
              fofa = fofa_crawl_ip()
              urlset = set()

              for u in SOURCE_URLS:
                  try:
                      r = requests.get(u, timeout=15, verify=False)
                      for line in r.text.split():
                          line = line.strip()
                          if ',' not in line: continue
                          p = line.split(',',1)[1]
                          m = re.search(r'//([^:/]+):(\d+)', p)
                          if m and ('hls/' in p or 'tsfile' in p):
                              ip = m.group(1)
                              if not ip.startswith(('10.','172.','192.','127.')):
                                  urlset.add(f"{ip}:{m.group(2)}")
                  except:
                      continue

              allip = list(fofa.union(urlset))
              available = []
              with ThreadPoolExecutor(CHECK_THREAD_NUM) as e:
                  fut = {e.submit(check_ip_availability, ip):ip for ip in allip}
                  for f in as_completed(fut):
                      ip = fut[f]
                      ok, infourl = f.result()
                      if ok:
                          available.append( (ip,infourl) )

              out = []
              lock = threading.Lock()
              with ThreadPoolExecutor(IP_THREAD_NUM) as e:
                  for ip,infourl in available:
                      e.submit(process_single_ip, ip, infourl, out, lock)

              out.sort(key=lambda x:x[1][0])
              os.makedirs("Hotel/ip", exist_ok=True)
              with open("Hotel/ip/hotel_ip.txt","w",encoding="utf-8") as f:
                  for ip,info in out:
                      cost,stable,quality,dev,reso = info
                      f.write(f"{ip} # 分辨率:{reso} 耗时:{cost:.1f}s 质量:{quality}\n")

              print("\n===== 完成 =====")
              print(f"有效IP: {len(out)}")
              for idx,(ip,info) in enumerate(out[:20],1):
                  c,s,q,d,r = info
                  print(f"{idx:2d}. {ip} | {r} | {c:.1f}s")

          if __name__ == "__main__":
              hotel_ip_port_from_urls()
          EOF
          python hotel_ip_port.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Hotel/ip/hotel_ip.txt
          git diff --quiet || git commit -m "自动更新 IP+分辨率 $(date '+%Y-%m-%d %H:%M')"
          git push
