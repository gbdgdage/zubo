name: IP_iptvz
on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

jobs:
  sync-append:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 我的仓库 (zubo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 克隆源仓库 (iptvz)
        run: |
          git clone --depth 1 https://github.com/q1017673817/iptvz.git temp-iptvz

      - name: 追加所有电信、联通IP（排除存档+自动适配直辖市）
        run: |
          mkdir -p ip
          cd ip

          find ../temp-iptvz/ip -type f \
            -name "*联通_ip.txt" -o -name "*电信_ip.txt" \
            | grep -v "存档_" | while read src_file; do

            filename=$(basename "$src_file")
            base="${filename/_ip.txt/}"

            # 自动映射文件名：直辖市加"市"（支持北京/天津/上海/重庆）
            province_part="${base:0:2}"
            operator_part="${base:2}"
            CITY_LIST="北京 天津 上海 重庆"

            # 判断是否为直辖市，决定是否加“市”
            if echo " $CITY_LIST " | grep -q " $province_part "; then
              target_province="${province_part}市"
            else
              target_province="$province_part"
            fi

            dest="${target_province}${operator_part}.txt"

            echo "处理: $filename → $dest"

            if [ -f "$dest" ]; then
              if [ -s "$dest" ]; then
                # 关键修复：给grep加上 || true，避免无新行时报错
                grep -xFf "$dest" "$src_file" -v >> "$dest" || true
              else
                cat "$src_file" >> "$dest"
              fi
            else
              cat "$src_file" > "$dest"
            fi
          done

      - name: 清理临时克隆目录
        run: |
          rm -rf temp-iptvz

      - name: 提交并推送变更
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add ip/*.txt
          if git diff --staged --quiet; then
            echo "✅ 无新IP可追加"
          else
            git commit -m "从iptvz更新"
            git push
            echo "✅ 已成功追加并推送新IP"
          fi
