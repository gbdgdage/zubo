name: zubo_ip
on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:
jobs:
  ip-sync-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: 原IP同步-1. 从kakaxi下载并解析 IPTV
        run: |
          declare -A initial_counts
          for file in ./ip/*.txt; do
            [ -f "$file" ] && initial_counts["$file"]=$(wc -l < "$file") || initial_counts["$file"]=0
          done
          curl -L https://github.com/kakaxi-1/IPTV/raw/refs/heads/main/iptv.txt -o iptv.txt
          CITY_LIST="北京 上海 天津 重庆"
          new_ip_count=0
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            url_part="${line%%$*}"
            label_part="${line##*$}"
            if [[ $url_part =~ ([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+) ]]; then
              ip_port="${BASH_REMATCH[1]}"
            else
              continue
            fi
            if [[ $label_part =~ ([^0-9]+)[0-9]+$ ]]; then
              province_operator="${BASH_REMATCH[1]}"
            else
              province_operator="$label_part"
            fi
            if [[ $province_operator =~ (.*)(电信|移动|联通) ]]; then
              province_part="${BASH_REMATCH[1]}"
              operator="${BASH_REMATCH[2]}"
            else
              continue
            fi
            if echo " $CITY_LIST " | grep -q " $province_part "; then
              target_province="${province_part}市"
            else
              target_province="$province_part"
            fi
            target_file="./ip/${target_province}${operator}.txt"
            touch "$target_file"
            if ! grep -xFq "$ip_port" "$target_file"; then
              echo "$ip_port" >> "$target_file"
              new_ip_count=$((new_ip_count + 1))
            fi
            sort -u "$target_file" -o "$target_file"
          done < iptv.txt
          rm -f iptv.txt
          echo "====================================="
          echo "📊 kakaxi IP 更新统计"
          echo "新增IP总数: $new_ip_count 条"
          echo "更新文件列表:"
          for file in ./ip/*.txt; do
            [ -f "$file" ] || continue
            final_count=$(wc -l < "$file")
            initial_count=${initial_counts["$file"]}
            added=$((final_count - initial_count))
            if [ $added -gt 0 ]; then
              echo "  - $(basename "$file"): +$added 条"
            fi
          done
          echo "====================================="
      - name: 原IP同步-2. 从 TV-yjc 同步IP（不覆盖）
        run: |
          git add ip/
          git diff --staged > before.patch
          git clone --depth 1 https://github.com/adminouyang/TV-yjc.git temp-tvyjc
          mkdir -p ip
          cd ip
          while read src_file; do
            filename=$(basename "$src_file")
            dest="$filename"
            echo "正在处理: $filename"
            if [ -f "$dest" ]; then
              grep -xFf "$dest" "$src_file" -v >> "$dest" || true
              awk '!seen[$0]++' "$dest" > "$dest.tmp" && mv "$dest.tmp" "$dest"
            else
              cp "$src_file" .
            fi
            sed -i '/^[[:space:]]*#/d' "$dest"
            sed -i '/无可用IP/d' "$dest"
          done < <(find ../temp-tvyjc/IP_Scan/result_ip -type f -name "*.txt")
          rm -rf ../temp-tvyjc
          cd ..
          echo "====================================="
          echo "📊 TV-yjc IP 更新统计"
          git add ip/
          git diff --staged > after.patch
          before_plus=$(grep -E '^\+' before.patch | grep -v '^\+\++' | sort)
          after_plus=$(grep -E '^\+' after.patch | grep -v '^\+\++' | sort)
          total_added=$(comm -13 <(echo "$before_plus") <(echo "$after_plus") | wc -l)
          echo "新增IP总数: $total_added 条"
          echo "更新文件列表:"
          comm -13 <(echo "$before_plus") <(echo "$after_plus") | \
            sed -E 's/^\+([^:]+):.*/\1/' | \
            sort | uniq -c | while read count file; do
              if [ "$count" -gt 0 ]; then
                echo "  - $(basename "$file"): +$count 条"
              fi
            done
          echo "====================================="
          rm -f before.patch after.patch
      - name: 原IP同步-3. 从 iptvz 同步电信/联通IP
        run: |
          declare -A initial_counts
          for file in ./ip/*.txt; do
            [ -f "$file" ] && initial_counts["$file"]=$(wc -l < "$file") || initial_counts["$file"]=0
          done
          git clone --depth 1 https://github.com/q1017673817/iptvz.git temp-iptvz
          mkdir -p ip
          cd ip
          CITY_LIST="北京 天津 上海 重庆"
          total_added=0
          declare -A file_added
          while read src_file; do
            filename=$(basename "$src_file")
            base="${filename/_ip.txt/}"
            province_part="${base:0:2}"
            operator_part="${base:2}"
            if echo " $CITY_LIST " | grep -q " $province_part "; then
              target_province="${province_part}市"
            else
              target_province="$province_part"
            fi
            dest="${target_province}${operator_part}.txt"
            echo "处理: $filename → $dest"
            temp_file=$(mktemp)
            grep -E "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+" "$src_file" > "$temp_file"
            if [ -f "$dest" ]; then
              added_lines=$(grep -xFf "$dest" "$temp_file" -v | wc -l)
              grep -xFf "$dest" "$temp_file" -v >> "$dest" || true
              awk '!seen[$0]++' "$dest" > "$dest.tmp" && mv "$dest.tmp" "$dest"
            else
              cp "$temp_file" "$dest"
              added_lines=$(wc -l < "$dest")
            fi
            rm -f "$temp_file"
            if [ $added_lines -gt 0 ]; then
              file_added["$dest"]=$added_lines
              total_added=$((total_added + added_lines))
            fi
          done < <(find ../temp-iptvz/ip -type f -name "*联通_ip.txt" -o -name "*电信_ip.txt" | grep -v "存档_")
          rm -rf ../temp-iptvz
          cd ..
          echo "====================================="
          echo "📊 iptvz IP 更新统计"
          echo "新增IP总数: $total_added 条"
          echo "更新文件列表:"
          for file in "${!file_added[@]}"; do
            echo "  - $file: +${file_added[$file]} 条"
          done
          echo "====================================="
      - name: 新增IP同步-4. 抓取gongdian并提取IP:端口（防限流+重试+备用接口版）
        run: |
          # 初始化统计
          declare -A initial_counts
          for file in ./ip/*.txt; do
            [ -f "$file" ] && initial_counts["$file"]=$(wc -l < "$file") || initial_counts["$file"]=0
          done
          mkdir -p ip
          # 抓取源内容
          TARGET_URL="https://gongdian.top/tv/guovin"
          curl -L -A "okhttp/5.1.0" "$TARGET_URL" -o gongdian_iptv.txt 2>/dev/null
          [ ! -s gongdian_iptv.txt ] && echo "⚠️  源内容为空，跳过本步骤" && exit 0
          # 提取去重host:port并导出
          grep "rtp" gongdian_iptv.txt | grep -E "//([^/:]+):[0-9]+/rtp" | \
            grep -Eo "//([^/:]+:[0-9]+)/" | sed 's#//##;s#/##' | sort -u > gongdian.txt
          echo "✅ 已导出host:port到gongdian.txt，数量: $(wc -l < gongdian.txt)"
          cat gongdian.txt
          [ ! -s gongdian.txt ] && echo "⚠️  无有效host:port，跳过" && exit 0
          # 配置参数
          CITY_LIST="北京 上海 天津 重庆"
          new_ip_count=0
          # ==============================================
          # 复刻Python代码：双阶段运营商识别（接口+IP段正则）
          # ==============================================
          # 阶段1：接口识别isp的关键词匹配（转小写）
          match_isp_by_api() {
            local isp_raw=$1
            isp_raw=$(echo "$isp_raw" | tr 'A-Z' 'a-z')
            if [[ $isp_raw =~ telecom|ct|chinatelecom|chinanet|netw ]]; then
              echo "电信"
            elif [[ $isp_raw =~ unicom|cu|chinaunicom|china169 ]]; then
              echo "联通"
            elif [[ $isp_raw =~ mobile|cm|chinamobile ]]; then
              echo "移动"
            else
              echo "未知"
            fi
          }
          # 阶段2：IP段正则匹配兜底（完全复刻Python的正则规则）
          match_isp_by_regex() {
            local ip=$1
            # 电信IP段
            if [[ $ip =~ ^(1[0-9]{2}|2[0-3]{2}|42|43|58|59|60|61|110|111|112|113|114|115|116|117|118|119|120|121|122|123|124|125|126|127|175|180|182|183|184|185|186|187|188|189|223)\. ]]; then
              echo "电信"
            # 联通IP段（复刻Python正则）
            elif [[ $ip =~ ^(42|43|58|59|60|61|110|111|112|113|114|115|116|117|118|119|120|121|122|123|124|125|126|127|175|180|182|183|184|185|186|187|188|189|223)\. ]]; then
              echo "联通"
            # 移动IP段（复刻Python正则）
            elif [[ $ip =~ ^(223|36|37|38|39|100|101|102|103|104|105|106|107|108|109|134|135|136|137|138|139|150|151|152|157|158|159|170|178|182|183|184|187|188|189)\. ]]; then
              echo "移动"
            else
              echo "未知"
            fi
          }
          # 新增：IP查询函数（ip-api.com重试+api.ip.sb备用接口）
          get_ip_info() {
            local ip=$1
            # ip-api.com重试2次，每次间隔2秒
            for i in {1..2}; do
              local info=$(curl -s "http://ip-api.com/json/${ip}?lang=zh-CN" \
                -A "okhttp/5.1.0" --connect-timeout 5 --max-time 10 2>/dev/null || true)
              # 验证是否查询成功（包含status:success）
              if [ -n "$info" ] && echo "$info" | grep -q '"status":"success"'; then
                echo "$info"
                return 0
              fi
              echo "⚠️  ip-api.com 第 $i 次查询失败，2秒后重试..."
              sleep 2
            done
            # ip-api.com重试失败，切换到api.ip.sb备用接口
            echo "⚠️  ip-api.com 重试失败，切换至备用接口 api.ip.sb 查询"
            local sb_info=$(curl -s "https://api.ip.sb/geoip/$ip" \
              -A "okhttp/5.1.0" --connect-timeout 5 --max-time 10 2>/dev/null || true)
            if [ -n "$sb_info" ]; then
              # 提取备用接口的省份和运营商，转成ip-api.com风格格式
              local region=$(echo "$sb_info" | grep -o '"region":"[^"]*' | cut -d'"' -f4 || true)
              local isp=$(echo "$sb_info" | grep -o '"isp":"[^"]*' | cut -d'"' -f4 || true)
              # 兼容备用接口空值情况
              [ -z "$region" ] && region="未知"
              [ -z "$isp" ] && isp="未知"
              echo "{\"regionName\":\"${region}\",\"isp\":\"${isp}\"}"
              return 0
            fi
            # 所有接口查询失败
            echo ""
            return 1
          }
          # 逐个处理host:port
          while IFS= read -r host_port; do
            host="${host_port%%:*}"
            port="${host_port##*:}"
            [ -z "$host" ] || [ -z "$port" ] && continue
            echo -e "\n🔧 开始处理：$host_port"
            # 1. 域名解析/纯IP判断（复刻Python socket.gethostbyname）
            if [[ "$host" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              ip="$host"
              echo "ℹ️  纯IP，无需解析：$ip"
            else
              ip=$(dig +short "$host" 2>/dev/null | head -n 1 | grep -E "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$" || true)
              if [ -z "$ip" ]; then
                echo "❌ 域名解析失败，跳过"
                continue
              fi
              echo "🌐 域名解析成功：$host → $ip"
            fi
            ip_port="${ip}:${port}"
            # 2. 过滤内网/组播IP
            if [[ "$ip" =~ ^(10\.|172\.1[6-9]\.|172\.2[0-9]\.|172\.3[0-1]\.|192\.168\.|22[4-9]\.|23[0-9]\.) ]]; then
              echo "❌ 内网/组播IP，跳过：$ip"
              continue
            fi
            # 3. 调用封装的IP查询函数（含重试+备用接口）
            ip_info=$(get_ip_info "$ip")
            if [ -z "$ip_info" ]; then
              echo "❌ 所有接口查询失败，跳过"
              continue
            fi
            # 4. 提取省份regionName（复刻Python data.get("regionName")）
            province=$(echo "$ip_info" | grep -o '"regionName":"[^"]*' | cut -d'"' -f4 || true)
            if [ -z "$province" ] || [ "$province" = "null" ] || [ "$province" = "未知" ]; then
              province="未知"
              echo "⚠️  接口未返回省份，设为：未知"
            else
              echo "ℹ️  接口提取省份：$province"
            fi
            [ "$province" = "未知" ] && continue
            # 5. 提取isp并双阶段识别（核心：复刻Python get_isp_from_api + get_isp_by_regex）
            isp_raw=$(echo "$ip_info" | grep -o '"isp":"[^"]*' | cut -d'"' -f4 || true)
            isp=$(match_isp_by_api "$isp_raw")
            echo "ℹ️  阶段1-接口识别运营商：$isp（原始isp：$isp_raw）"
            if [ "$isp" = "未知" ]; then
              isp=$(match_isp_by_regex "$ip")
              echo "ℹ️  阶段2-IP段正则兜底：$isp"
            fi
            [ "$isp" = "未知" ] && echo "❌ 双阶段识别运营商失败，跳过" && continue
            # 6. 修正直辖市名称（北京→北京市，匹配ip/文件命名）
            if echo " $CITY_LIST " | grep -q " $province "; then
              target_province="${province}市"
              echo "ℹ️  直辖市修正：$province → $target_province"
            else
              target_province="$province"
            fi
            # 7. 写入IP:端口（去重，和原有文件格式一致）
            target_file="./ip/${target_province}${isp}.txt"
            touch "$target_file"
            if ! grep -xFq "$ip_port" "$target_file"; then
              echo "$ip_port" >> "$target_file"
              new_ip_count=$((new_ip_count + 1))
              echo "✅  新增成功：$ip_port → $(basename "$target_file")"
            else
              echo "ℹ️  已存在，跳过：$ip_port → $(basename "$target_file")"
            fi
            # 延长休眠至1秒，彻底避免ip-api.com限流
            sleep 1
          done < gongdian.txt
          # 统一去重排序所有IP文件
          for file in ./ip/*.txt; do
            sort -u "$file" -o "$file" 2>/dev/null || true
          done
          # 清理临时文件
          rm -f gongdian_iptv.txt
          # 最终统计输出（和文件新增完全对齐）
          echo -e "\n====================================="
          echo "📊 gongdian(rtp) IP:端口 更新统计"
          echo "新增有效公网IP:端口总数: $new_ip_count 条"
          echo "====================================="
          echo "更新文件列表（仅展示有新增的）:"
          for file in ./ip/*.txt; do
            [ -f "$file" ] || continue
            final_count=$(wc -l < "$file" 2>/dev/null || 0)
            initial_count=${initial_counts["$file"]:-0}
            added=$((final_count - initial_count))
            if [ $added -gt 0 ]; then
              echo "  - $(basename "$file"): +$added 条"
            fi
          done
          echo "====================================="
      - name: 提交并推送所有IP同步更新
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add ip/
          if git diff --staged --quiet; then
            echo "✅ 无kakaxi/TV-yjc/iptvz/gongdian IP更新，无需提交"
          else
            if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              commit_msg="手动触发-kakaxi/TV-yjc/iptvz/gongdian(rtp) IP同步更新"
            else
              commit_msg="定时触发-kakaxi/TV-yjc/iptvz/gongdian(rtp) IP同步更新"
            fi
            git commit -m "$commit_msg"
            git push
            echo "✅ 已提交推送所有IP同步更新"
          fi
