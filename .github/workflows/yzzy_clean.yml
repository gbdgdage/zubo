name: Clean YZZY M3U8
on:
  workflow_dispatch: # 允许手动触发
  schedule:
    - cron: '0 0 * * *' # 每天UTC 0点自动跑（可选）

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run clean script
        run: |
          python yzzy_clean.py

      # 关键步骤：上传生成的文件
      - name: Upload logs and output
        uses: actions/upload-artifact@v4
        with:
          name: m3u8-results
          path: |
            m3u8_clean_log.txt
            cleaned.m3u8
