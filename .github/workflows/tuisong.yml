name: tuisong
on:
  workflow_run:
    workflows: ["zubo", "hotel"]
    types: [completed]
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout 源仓库
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 1

      - name: Checkout 目标仓库
        uses: actions/checkout@v4
        with:
          repository: lisa3456/lisa3456.github.io
          token: ${{ secrets.TARGET_REPO_TOKEN }}
          path: target
          fetch-depth: 1

      - name: 同步文件并按规则追加内容
        run: |
          set -e
          TRIGGER_WORKFLOW="${{ github.event.workflow_run.name }}"
          echo "触发 workflow: $TRIGGER_WORKFLOW"

          # 同步 IPTV.txt 并追加 df.txt
          if [ "$TRIGGER_WORKFLOW" = "zubo" ] || [ "$TRIGGER_WORKFLOW" = "" ]; then
            if [ -f "source/IPTV.txt" ]; then
              cp -f source/IPTV.txt target/
              echo "✅ 同步 IPTV.txt"
              # 追加 df.txt 到 IPTV.txt 末尾
              if [ -f "source/df.txt" ]; then
                echo "" >> target/IPTV.txt
                cat source/df.txt >> target/IPTV.txt
                echo "✅ 已把 df.txt 追加到 IPTV.txt 末尾"
              else
                echo "ℹ️ 未找到 df.txt，跳过追加"
              fi
            fi
          fi

          # 同步 hotel.txt → 追加「数字,#genre#」区块到文件末尾，再追加 df.txt
          if [ "$TRIGGER_WORKFLOW" = "hotel" ] || [ "$TRIGGER_WORKFLOW" = "" ]; then
            if [ -f "source/Hotel/hotel.txt" ]; then
              cp -f source/Hotel/hotel.txt target/
              echo "✅ 同步 hotel.txt"
              # 追加 IPTV.txt 中 从「数字,#genre#」开始到文件末尾的所有内容
              if [ -f "source/IPTV.txt" ]; then
                echo "" >> target/hotel.txt
                awk '/^数字,#genre#/,0 {print}' source/IPTV.txt >> target/hotel.txt || true
                echo "✅ 已把 IPTV.txt 中「数字,#genre#」的完整频道区块追加到 hotel.txt"
              else
                echo "ℹ️ 未找到 IPTV.txt，跳过追加频道"
              fi
              # 再追加 df.txt 到 hotel.txt 末尾
              if [ -f "source/df.txt" ]; then
                echo "" >> target/hotel.txt
                cat source/df.txt >> target/hotel.txt
                echo "✅ 已把 df.txt 追加到 hotel.txt 末尾"
              else
                echo "ℹ️ 未找到 df.txt，跳过追加"
              fi
            fi
          fi

      - name: 提交并推送
        working-directory: target
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add IPTV.txt hotel.txt || true
          git commit -m "chore: 同步并追加IPTV「数字,#genre#」区块与df.txt到hotel.txt" || echo "⚠️ 无文件变更，跳过提交"
          git push origin master || echo "⚠️ 推送失败，可能无变更"
